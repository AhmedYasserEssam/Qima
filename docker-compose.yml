services:
  db:
    image: postgres:16
    container_name: qima_postgres
    environment:
      POSTGRES_DB: qima
      POSTGRES_USER: qima_user
      POSTGRES_PASSWORD: qima_password
    ports:
      - "15432:5432"
    volumes:
      - qima_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: qima_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qima.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: qima_airflow_init
    depends_on:
      - db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://qima_user:qima_password@db:5432/qima
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      DATABASE_URL: postgresql://qima_user:qima_password@db:5432/qima
      QIMA_REPO_ROOT: /opt/airflow/qima_project
    volumes:
      - ./:/opt/airflow/qima_project
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username admin --password admin --firstname Airflow --lastname Admin --role Admin --email admin@example.com || true)"

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: qima_airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://qima_user:qima_password@db:5432/qima
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      DATABASE_URL: postgresql://qima_user:qima_password@db:5432/qima
      QIMA_REPO_ROOT: /opt/airflow/qima_project
    volumes:
      - ./:/opt/airflow/qima_project
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: qima_airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://qima_user:qima_password@db:5432/qima
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      DATABASE_URL: postgresql://qima_user:qima_password@db:5432/qima
      QIMA_REPO_ROOT: /opt/airflow/qima_project
    volumes:
      - ./:/opt/airflow/qima_project
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler

volumes:
  qima_postgres_data:
